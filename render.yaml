services:
  - type: web
    name: vertext-digital
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:netlify
    startCommand: node server.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
